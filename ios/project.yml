name: Fitnesswispr
options:
  bundleIdPrefix: com.fitnesswispr
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  Fitnesswispr:
    type: application
    platform: iOS
    sources:
      - path: Fitnesswispr
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fitnesswispr.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Fitnesswispr/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
    info:
      path: Fitnesswispr/Info.plist
      properties:
        CFBundleDisplayName: Fitnesswispr
        CFBundleShortVersionString: "1.0"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSSpeechRecognitionUsageDescription: "Fitnesswispr uses speech recognition to log your workouts by voice."
        NSMicrophoneUsageDescription: "Fitnesswispr needs the microphone to record your spoken workout."
        API_BASE_URL: "http://localhost:8055"
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true

  FitnesswisrUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FitnesswisrUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fitnesswispr.app.uitests
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
    dependencies:
      - target: Fitnesswispr
