name: Fitnesswispr
options:
  bundleIdPrefix: com.fitnesswispr
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  Fitnesswispr:
    type: application
    platform: iOS
    sources:
      - path: Fitnesswispr
    entitlements:
      path: Fitnesswispr/Fitnesswispr.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fitnesswispr.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "9"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Fitnesswispr/Info.plist
        DEVELOPMENT_TEAM: WAHLKW2N4G
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Fitnesswispr/Info.plist
      properties:
        CFBundleDisplayName: SpotRep
        CFBundleShortVersionString: "1.0"
        CFBundleIconName: AppIcon
        CFBundleIcons:
          CFBundlePrimaryIcon:
            CFBundleIconName: AppIcon
            CFBundleIconFiles:
              - AppIcon60x60
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSSpeechRecognitionUsageDescription: "SpotRep uses speech recognition to log your workouts by voice."
        NSMicrophoneUsageDescription: "SpotRep needs the microphone to record your spoken workout."
        NSHealthShareUsageDescription: "SpotRep reads your workout history from Apple Health to show your training consistency."
        NSHealthUpdateUsageDescription: "SpotRep only reads your workout history for consistency and does not write data to Apple Health."
        API_BASE_URL: "http://52.54.56.116:8000"
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        CFBundleURLTypes:
          - CFBundleURLName: com.fitnesswispr.app
            CFBundleURLSchemes:
              - spotrep

  FitnesswisrUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FitnesswisrUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fitnesswispr.app.uitests
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
    dependencies:
      - target: Fitnesswispr
